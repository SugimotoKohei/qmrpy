repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run --locked ruff check src tests scripts
        language: system
        pass_filenames: false
        types_or: [python, pyi]
      - id: ruff-format
        name: ruff format
        entry: uv run --locked ruff format --check src tests scripts
        language: system
        pass_filenames: false
        types_or: [python, pyi]
      - id: trailing-whitespace
        name: trim trailing whitespace
        entry: uv run --locked trailing-whitespace-fixer
        language: system
        types: [text]
      - id: end-of-file-fixer
        name: fix end of files
        entry: uv run --locked end-of-file-fixer
        language: system
        types: [text]
      - id: check-yaml
        name: check yaml
        entry: uv run --locked check-yaml
        language: system
        types: [yaml]
